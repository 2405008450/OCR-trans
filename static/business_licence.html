<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营业执照翻译系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 印章验证遮罩 */
        .verify-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .verify-overlay.active {
            display: flex;
        }
        .verify-modal {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            width: 520px;
            max-width: 95vw;
            padding: 28px 32px 24px;
        }
        .verify-modal h3 {
            margin: 0 0 16px;
            font-size: 18px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .verify-info-box {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.7;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .verify-modal .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .verify-modal .btn-confirm {
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .verify-modal .btn-correct {
            background: #FF9800;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .verify-modal .btn-skip {
            background: #9E9E9E;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .verify-modal .btn-confirm:hover { background: #43a047; }
        .verify-modal .btn-correct:hover { background: #f57c00; }
        .verify-modal .btn-skip:hover    { background: #757575; }

        .correction-row {
            display: none;
            margin-top: 14px;
            gap: 8px;
        }
        .correction-row.active {
            display: flex;
        }
        .correction-row input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
        }
        .correction-row input:focus {
            border-color: var(--primary-color);
        }
        .correction-row button {
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        /* 日志区域 */
        .log-panel {
            background: #1e293b;
            color: #94a3b8;
            border-radius: 8px;
            padding: 14px 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 260px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 16px;
        }
        .log-panel .log-success { color: #4ade80; }
        .log-panel .log-error   { color: #f87171; }
        .log-panel .log-sep     { color: #6366f1; }

        /* 图片对比 */
        .image-compare {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }
        .image-compare-item {
            text-align: center;
        }
        .image-compare-item p {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0 0 8px;
            font-weight: 600;
        }
        .image-compare-item img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: zoom-in;
        }
        @media (max-width: 600px) {
            .image-compare { grid-template-columns: 1fr; }
        }

        .shortcut-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- 印章验证弹窗 -->
    <div class="verify-overlay" id="verifyOverlay">
        <div class="verify-modal">
            <h3><i class="fas fa-stamp" style="color:#FF9800"></i> 印章文字验证</h3>
            <div class="verify-info-box" id="verifyInfoBox"></div>
            <div class="btn-row">
                <button class="btn-confirm" id="btnConfirm">✅ 确认正确 (Y)</button>
                <button class="btn-correct" id="btnCorrect">✏️ 修正内容 (N)</button>
                <button class="btn-skip"    id="btnSkip">⏭️ 跳过 (S)</button>
            </div>
            <div class="correction-row" id="correctionRow">
                <input type="text" id="correctionInput" placeholder="请输入正确的文字内容...">
                <button id="btnSubmitCorrection">提交</button>
            </div>
            <div class="shortcut-hint">键盘快捷键：Y = 确认，N = 修正，S = 跳过</div>
        </div>
    </div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-building"></i>
                <h1>营业执照翻译系统</h1>
            </div>
            <p class="subtitle">上传营业执照图片，自动 OCR 识别并将中文翻译为英文</p>
            <p class="subtitle" style="margin-top:8px;">
                <a href="/" style="color:#fff;text-decoration:underline;">返回导航</a>
            </p>
        </header>

        <main class="main-content">

            <!-- ① 上传区域 -->
            <section class="upload-section" id="uploadSection">
                <div class="upload-card">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <h2>上传营业执照图片</h2>
                    <p class="upload-desc">支持 JPG、PNG、BMP、TIF 等格式，最大 50MB</p>

                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept="image/*" hidden>
                        <div class="upload-placeholder" id="uploadPlaceholder">
                            <i class="fas fa-file-upload"></i>
                            <p>拖拽文件到这里，或点击选择文件</p>
                        </div>
                        <div class="file-preview" id="filePreview" style="display:none;">
                            <img id="previewImage" src="" alt="预览">
                            <div class="file-info">
                                <p id="fileName"></p>
                                <button class="btn-remove" id="btnRemove">
                                    <i class="fas fa-times"></i> 移除
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 选项 -->
                    <div class="options-panel">
                        <div class="option-group">
                            <label>
                                <i class="fas fa-language"></i> 源语言:
                                <select id="sourceLang">
                                    <option value="zh" selected>中文</option>
                                    <option value="en">English</option>
                                    <option value="ja">日本語</option>
                                </select>
                            </label>
                        </div>
                        <div class="option-group">
                            <label>
                                <i class="fas fa-globe"></i> 目标语言:
                                <select id="targetLang">
                                    <option value="en" selected>English</option>
                                    <option value="zh">中文</option>
                                    <option value="ja">日本語</option>
                                </select>
                            </label>
                        </div>
                        <div class="option-group">
                            <label>
                                <i class="fas fa-cog"></i> 配置:
                                <select id="configFile">
                                    <option value="config/auto.yaml" selected>自动识别方向（推荐）</option>
                                    <option value="config/vertical.yaml">竖版文档</option>
                                    <option value="config/horizontal.yaml">横版文档</option>
                                </select>
                            </label>
                        </div>
                    </div>

                    <button class="btn-primary" id="btnStart" disabled>
                        <i class="fas fa-play"></i> 开始翻译
                    </button>
                </div>
            </section>

            <!-- ② 处理中 -->
            <section id="processingSection" style="display:none;">
                <div class="processing-card">
                    <div class="processing-animation">
                        <div class="spinner"></div>
                    </div>
                    <h2 id="processingTitle">正在处理...</h2>
                    <p class="processing-status" id="processingStatus">初始化中</p>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <p class="progress-text" id="progressText">0%</p>
                    <div class="log-panel" id="logPanel"></div>
                </div>
            </section>

            <!-- ③ 结果 -->
            <section id="resultSection" style="display:none;">
                <div class="result-card">
                    <div class="result-header">
                        <i class="fas fa-check-circle" style="color:var(--success-color);font-size:32px;"></i>
                        <h2>翻译完成</h2>
                    </div>
                    <div class="image-compare" id="imageCompare"></div>
                    <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;">
                        <a id="downloadLink" class="btn-primary" download style="text-decoration:none;">
                            <i class="fas fa-download"></i> 下载翻译结果
                        </a>
                        <button class="btn-secondary" id="btnRestart">
                            <i class="fas fa-redo"></i> 重新翻译
                        </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="/static/business_licence.js"></script>
</body>
</html>
