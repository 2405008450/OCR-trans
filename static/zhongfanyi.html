<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中翻译专检 - 原文译文对比与自动修复</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-language"></i>
                <h1>中翻译专检</h1>
            </div>
            <p class="subtitle" id="pageSubtitle">支持双文件对比与单文件双语对照检查，并导出 JSON / Excel 报告</p>
            <nav class="header-nav">
                <a href="/"><i class="fas fa-home"></i> 首页</a>
                <a href="/dashboard"><i class="fas fa-gauge-high"></i> 任务工作台</a>
                <span style="color:var(--line); margin:0 4px">|</span>
                <button type="button" class="el-button el-button--primary" id="btnEditRule"><i class="fas fa-edit"></i> 编辑规则文件</button>
            </nav>
        </header>

        <main class="main-content">
            <section class="upload-section" id="uploadSection">
                <div class="upload-card">
                    <h2>上传待专检文档</h2>
                    <p class="upload-desc" id="uploadDesc">请选择模式后上传文件</p>

                    <div class="options-panel">
                        <div class="option-group" style="grid-column: 1 / -1;">
                            <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:center;">
                                <span><i class="fas fa-sliders"></i> 检查模式:</span>
                                <label style="display:flex; align-items:center; gap:6px;">
                                    <input type="radio" name="checkMode" id="modeDouble" value="double">
                                    <span>双文件模式</span>
                                </label>
                                <label style="display:flex; align-items:center; gap:6px;">
                                    <input type="radio" name="checkMode" id="modeSingle" value="single">
                                    <span>单文件模式</span>
                                </label>
                            </div>
                            <div id="modeHint" style="margin-top:8px; color:var(--text-secondary, #64748b); font-size:13px;"></div>
                        </div>

                        <div class="option-group" style="grid-column: 1 / -1;">
                            <label for="modelSelect" style="display:flex; align-items:center; gap:6px;">
                                <i class="fas fa-robot"></i> 模型选择
                            </label>
                            <select id="modelSelect" style="margin-top:8px; width:100%;"></select>
                            <div id="modelDesc" style="margin-top:8px; color:var(--text-secondary, #64748b); font-size:13px;"></div>
                        </div>

                        <div id="doubleFileFields" style="grid-column: 1 / -1;">
                            <div class="option-group" style="grid-column: 1 / -1;">
                                <label style="width: 100%;">
                                    <i class="fas fa-file-alt"></i> 原文文件:
                                    <input type="file" id="originalFile" accept=".docx,.doc,.pdf,.xlsx,.xls,.pptx" style="margin-left: 8px;">
                                </label>
                            </div>
                            <div class="option-group" style="grid-column: 1 / -1;">
                                <label style="width: 100%;">
                                    <i class="fas fa-file-alt"></i> 译文文件:
                                    <input type="file" id="translatedFile" accept=".docx,.doc,.pdf,.xlsx,.xls,.pptx" style="margin-left: 8px;">
                                </label>
                            </div>
                        </div>

                        <div id="singleFileFields" style="grid-column: 1 / -1; display:none;">
                            <div class="option-group" style="grid-column: 1 / -1;">
                                <label style="width: 100%;">
                                    <i class="fas fa-file-lines"></i> 双语对照文件:
                                    <input type="file" id="singleFile" accept=".docx,.doc,.pdf,.xlsx,.xls,.pptx" style="margin-left: 8px;">
                                </label>
                            </div>
                            <div style="margin-top:8px; color:var(--text-secondary, #64748b); font-size:13px;">
                                支持 `.docx / .doc / .pdf / .xlsx / .xls / .pptx`；会导出 JSON / Excel 报告，可按文件类型输出修订版或批注版。
                            </div>
                        </div>

                        <div class="option-group" style="grid-column: 1 / -1;">
                            <label class="checkbox-inline">
                                <input type="checkbox" id="useAiRule" name="use_ai_rule">
                                使用 AI 生成规则（需上传规则文件）
                            </label>
                        </div>
                        <div class="option-group" style="grid-column: 1 / -1;">
                            <label style="width: 100%;">
                                <i class="fas fa-file-pdf"></i> 规则文件（可选，pdf/docx/txt）:
                                <input type="file" id="ruleFile" accept=".pdf,.docx,.doc,.txt" style="margin-left: 8px;">
                            </label>
                            <span class="model-desc">勾选「使用 AI 规则」时上传，供 AI 总结生成对比规则</span>
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px;">
                        <button class="btn-secondary" onclick="window.location.href='/'">
                            <i class="fas fa-home"></i> 返回首页
                        </button>
                        <button class="btn-primary" id="btnRun" style="max-width: 360px;">
                            <i class="fas fa-play"></i> 开始处理
                        </button>
                    </div>
                </div>
            </section>

            <section class="processing-section" id="processingSection" style="display: none;">
                <div class="processing-card">
                    <div class="spinner"></div>
                    <h2 id="processingTitle">中翻译专检处理中...</h2>
                    <p id="processingText">正在提取文本并调用对比引擎</p>
                    <div class="progress-container" style="margin-top: 24px;">
                        <div class="progress-bar-wrapper">
                            <div class="progress-bar" id="progressBar">
                                <span id="progressPercent" class="progress-percent">0%</span>
                            </div>
                        </div>
                        <div class="progress-details" id="progressDetails">
                            <p id="progressStep">初始化...</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="result-section" id="resultSection" style="display: none;">
                <div class="result-header">
                    <h2><i class="fas fa-check-circle"></i> 专检完成</h2>
                    <button class="btn-secondary" id="btnReset">
                        <i class="fas fa-rotate-right"></i> 重新开始
                    </button>
                </div>
                <div id="resultSummary" style="margin-bottom:16px; color:var(--text-secondary, #64748b);"></div>
                <div class="result-stats" id="resultStats"></div>
                <div class="result-grid" id="resultGrid"></div>
            </section>
        </main>
    </div>

    <div id="ruleEditorModal" class="modal" style="display: none;">
        <div class="modal-content" style="width: 800px; max-width: 90vw;">
            <div class="modal-header">
                <h2>编辑规则文件</h2>
                <span class="close" onclick="closeRuleEditor()">&times;</span>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 16px;">
                    <label style="margin-right: 16px;">
                        <input type="radio" name="ruleType" value="custom" checked onchange="loadRuleContent()"> 自定义规则
                    </label>
                    <label>
                        <input type="radio" name="ruleType" value="default" onchange="loadRuleContent()"> 默认规则
                    </label>
                </div>
                <textarea id="ruleContent" style="width: 100%; height: 400px; padding: 12px; font-family: monospace; border: 1px solid #dcdfe6; border-radius: 4px; resize: vertical;"></textarea>
            </div>
            <div class="modal-footer" style="text-align: right; margin-top: 16px;">
                <button class="el-button" onclick="closeRuleEditor()">取消</button>
                <button type="button" class="el-button el-button--primary" onclick="saveRuleContent()">保存（仅本次使用，不写磁盘）</button>
            </div>
        </div>
    </div>

    <script src="/static/zhongfanyi.js"></script>
    <script src="/static/header.js"></script>
</body>
</html>
