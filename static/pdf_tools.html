<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 工具箱</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #07111f; --panel: rgba(255,255,255,.07); --line: rgba(255,255,255,.12);
            --text: #f8fafc; --muted: rgba(226,232,240,.72); --cyan: #38bdf8;
            --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; color: var(--text);
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at 15% 5%, rgba(56,189,248,.19), transparent 28%),
                radial-gradient(circle at 88% 18%, rgba(168,85,247,.14), transparent 26%),
                linear-gradient(145deg,#050b14,#07111f 50%,#102235);
        }
        .page { width: min(1280px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 54px; }
        .title-row { display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:18px; }
        h1 { margin:0 0 8px; font-size:30px; }
        .subtitle { margin:0; color:var(--muted); line-height:1.7; }
        .layout { display:grid; grid-template-columns:minmax(340px,430px) minmax(0,1fr); gap:18px; align-items:start; }
        .panel { border:1px solid var(--line); border-radius:10px; background:var(--panel); box-shadow:0 18px 44px rgba(0,0,0,.22); }
        .panel + .panel { margin-top:18px; }
        .panel-head { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:18px 18px 0; }
        .panel-head h2 { margin:0; font-size:17px; }
        .panel-body { padding:18px; }
        .field { margin-bottom:16px; }
        label.field-label { display:block; margin-bottom:8px; color:#e2e8f0; font-size:13px; font-weight:700; }
        input[type="text"], input[type="number"], select {
            width:100%; min-height:44px; padding:0 13px; border-radius:8px; border:1px solid var(--line);
            outline:none; color:var(--text); background:rgba(15,23,42,.72);
        }
        input:focus, select:focus { border-color:rgba(56,189,248,.68); box-shadow:0 0 0 3px rgba(56,189,248,.13); }
        select option { color:#f8fafc; background:#0f172a; }
        .check-row { display:flex; align-items:center; gap:9px; color:var(--muted); font-size:13px; }
        .button-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
        button, .action-link {
            min-height:42px; padding:0 16px; border:0; border-radius:8px; display:inline-flex; align-items:center;
            justify-content:center; gap:8px; color:#082032; background:var(--cyan); font-weight:800; cursor:pointer; text-decoration:none;
        }
        button.secondary, .action-link.secondary { color:#e2e8f0; background:rgba(255,255,255,.08); border:1px solid var(--line); }
        button:disabled { opacity:.48; cursor:not-allowed; }
        .operation-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; }
        .op-button { min-height:52px; padding:7px 6px; color:var(--muted); background:rgba(15,23,42,.56); border:1px solid var(--line); font-size:12px; }
        .op-button.active { color:#082032; background:var(--cyan); border-color:var(--cyan); }
        .hint { color:var(--muted); font-size:12px; line-height:1.6; }
        .notice { margin-top:12px; padding:10px 12px; border:1px solid rgba(56,189,248,.32); border-radius:8px; color:#bae6fd; background:rgba(56,189,248,.08); font-size:13px; line-height:1.55; }
        .notice.error { color:#fecaca; border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.08); }
        .notice.success { color:#bbf7d0; border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.08); }
        .is-hidden { display:none !important; }
        .file-list { max-height:360px; overflow:auto; border:1px solid var(--line); border-radius:8px; background:rgba(2,6,23,.35); }
        .file-row { display:grid; grid-template-columns:28px minmax(0,1fr) auto; align-items:center; gap:10px; padding:11px 12px; border-bottom:1px solid rgba(255,255,255,.07); cursor:pointer; }
        .file-row.merge-row { grid-template-columns:18px 24px minmax(0,1fr) auto 58px; cursor:grab; }
        .file-row:last-child { border-bottom:0; }
        .file-row:hover, .file-row.selected, .file-row.is-selected { background:rgba(56,189,248,.10); }
        .file-row.is-unselected { opacity:.68; }
        .file-row.is-dragging { opacity:.42; cursor:grabbing; }
        .file-row input { margin:0; }
        .drag-handle { color:var(--muted); text-align:center; }
        .file-name { font-size:13px; font-weight:700; overflow-wrap:anywhere; }
        .file-path { margin-top:4px; color:var(--muted); font-size:11px; overflow-wrap:anywhere; }
        .file-size { color:var(--muted); font-size:11px; line-height:1.55; text-align:right; white-space:nowrap; }
        .order-number { display:inline-block; min-width:19px; color:var(--cyan); }
        .order-actions { display:flex; gap:4px; }
        .icon-btn { width:26px; min-height:28px; padding:0; color:#e2e8f0; background:rgba(255,255,255,.08); border:1px solid var(--line); }
        .selection-toolbar { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:8px; margin:10px 0; }
        .selection-summary { color:#dbeafe; font-size:12px; }
        .selection-actions { display:flex; gap:6px; }
        .selection-actions button { min-height:32px; padding:0 10px; font-size:11px; }
        .empty { padding:34px 18px; color:var(--muted); text-align:center; line-height:1.7; }
        .empty i { margin-bottom:8px; font-size:26px; color:rgba(56,189,248,.65); }
        .progress-shell { height:9px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,.09); }
        .progress-fill { width:0; height:100%; border-radius:inherit; background:linear-gradient(90deg,var(--cyan),var(--green)); transition:width .25s ease; }
        .status-line { display:flex; justify-content:space-between; gap:12px; margin:10px 0 18px; color:var(--muted); font-size:13px; }
        .metric-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
        .metric { min-width:0; padding:13px; border:1px solid var(--line); border-radius:8px; background:rgba(15,23,42,.54); }
        .metric small { display:block; color:var(--muted); font-size:11px; }
        .metric strong { display:block; margin-top:7px; font-size:19px; overflow-wrap:anywhere; }
        .summary { margin:16px 0 0; color:#dbeafe; line-height:1.7; }
        .download-area { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
        .table-wrap { margin-top:16px; overflow:auto; border:1px solid var(--line); border-radius:8px; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th, td { padding:10px; border-bottom:1px solid rgba(255,255,255,.07); text-align:left; }
        th { color:#cbd5e1; background:rgba(15,23,42,.72); }
        td { color:#e2e8f0; }
        .root-list { margin-top:10px; display:grid; gap:7px; }
        .root-item { display:flex; gap:8px; align-items:flex-start; color:var(--muted); font-size:12px; overflow-wrap:anywhere; }
        @media(max-width:900px){ .layout{grid-template-columns:1fr;} .metric-grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
        @media(max-width:560px){ .page{width:min(100% - 20px,1280px);} .title-row{display:block;} .operation-grid{grid-template-columns:repeat(2,minmax(0,1fr));} .metric-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>
    <div class="page">
        <div class="title-row">
            <div>
                <h1>PDF 工具箱</h1>
                <p class="subtitle">合并、拆分、压缩、提取、删除或旋转 PDF 页面。支持奇偶页快捷选择，源目录始终保持只读。</p>
            </div>
            <div class="button-row">
                <a class="action-link secondary" href="/dashboard"><i class="fas fa-gauge-high"></i> 任务工作台</a>
            </div>
        </div>

        <div class="layout">
            <div>
                <section class="panel">
                    <div class="panel-head"><h2><i class="fas fa-folder-open"></i> 选择源 PDF</h2></div>
                    <div class="panel-body">
                        <div class="field">
                            <label class="field-label" for="directoryPath">共享目录路径</label>
                            <input id="directoryPath" type="text" placeholder="例如：\\win-server\服务器资料7\客户\项目" />
                        </div>
                        <label class="check-row"><input id="recursiveInput" type="checkbox" checked /> 扫描子目录</label>
                        <div class="button-row">
                            <button id="scanBtn"><i class="fas fa-magnifying-glass"></i> 扫描 PDF</button>
                            <button id="resetBtn" class="secondary"><i class="fas fa-rotate-left"></i> 清空</button>
                        </div>
                        <div id="scanMessage" class="notice is-hidden"></div>
                        <div class="field" style="margin-top:16px;margin-bottom:0">
                            <label class="field-label">文件列表 <span id="fileCount" class="hint">0 个</span></label>
                            <div id="mergeSelectionToolbar" class="selection-toolbar">
                                <div class="selection-summary">已选 <strong id="selectedCount">0</strong> 个，共 <strong id="selectedSize">0 B</strong></div>
                                <div class="selection-actions">
                                    <button id="selectAllBtn" class="secondary" disabled>全选</button>
                                    <button id="clearSelectionBtn" class="secondary" disabled>取消全选</button>
                                </div>
                            </div>
                            <div id="fileList" class="file-list">
                                <div class="empty"><i class="fas fa-file-pdf"></i><br>扫描目录后选择 PDF。</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-head"><h2><i class="fas fa-shield-halved"></i> 路径与限制</h2></div>
                    <div class="panel-body">
                        <div class="hint">源文件只读；暂存、处理和结果全部位于服务器本地目录。</div>
                        <div id="allowedRoots" class="root-list"></div>
                        <div id="limitHint" class="hint" style="margin-top:10px"></div>
                    </div>
                </section>
            </div>

            <div>
                <section class="panel">
                    <div class="panel-head"><h2><i class="fas fa-screwdriver-wrench"></i> 处理设置</h2></div>
                    <div class="panel-body">
                        <div id="operationGrid" class="operation-grid">
                            <button class="op-button active" data-operation="merge"><i class="fas fa-object-group"></i> 合并</button>
                            <button class="op-button" data-operation="split"><i class="fas fa-scissors"></i> 拆分</button>
                            <button class="op-button" data-operation="compress"><i class="fas fa-compress"></i> 压缩</button>
                            <button class="op-button" data-operation="extract"><i class="fas fa-file-export"></i> 提取页面</button>
                            <button class="op-button" data-operation="delete"><i class="fas fa-file-circle-minus"></i> 删除页面</button>
                            <button class="op-button" data-operation="rotate"><i class="fas fa-rotate"></i> 旋转页面</button>
                        </div>

                        <div id="mergeOptions" class="operation-options" style="margin-top:18px">
                            <div class="field"><label class="field-label" for="mergeFilename">输出文件名</label><input id="mergeFilename" type="text" value="合并结果.pdf" /></div>
                            <div class="hint">请在左侧至少勾选 2 个 PDF；列表顺序就是合并顺序，可拖动或使用上下箭头调整。</div>
                        </div>

                        <div id="splitOptions" class="operation-options is-hidden" style="margin-top:18px">
                            <div class="field"><label class="field-label" for="splitMode">拆分方式</label><select id="splitMode"><option value="every">每 N 页一个文件</option><option value="ranges">自定义页组</option></select></div>
                            <div id="pagesPerFileField" class="field"><label class="field-label" for="pagesPerFile">每个文件页数</label><input id="pagesPerFile" type="number" min="1" max="1000" value="1" /></div>
                            <div id="pageGroupsField" class="field is-hidden"><label class="field-label" for="pageGroups">页组</label><input id="pageGroups" type="text" placeholder="例如：1-3;4,6;7-9" /><div class="hint">分号分隔输出文件，逗号组合不连续页面。</div></div>
                            <div class="field"><label class="field-label" for="splitPrefix">输出前缀</label><input id="splitPrefix" type="text" value="拆分结果" /></div>
                        </div>

                        <div id="compressOptions" class="operation-options is-hidden" style="margin-top:18px">
                            <div class="field"><label class="field-label" for="compressionMode">压缩模式</label><select id="compressionMode"><option value="lossless">无损优化</option><option value="high" selected>清晰优先</option><option value="balanced">均衡压缩</option><option value="strong">强力压缩（仅建议预览）</option></select><div id="compressionHint" class="hint"></div></div>
                            <div class="field"><label class="field-label" for="compressFilename">输出文件名</label><input id="compressFilename" type="text" value="压缩结果.pdf" /></div>
                        </div>

                        <div id="pageOptions" class="operation-options is-hidden" style="margin-top:18px">
                            <div id="pageModeField" class="field"><label class="field-label" for="pageSelectionMode">页面选择</label><select id="pageSelectionMode"><option value="custom">自定义页码</option><option value="odd">奇数页（1、3、5…）</option><option value="even">偶数页（2、4、6…）</option></select></div>
                            <div id="pageSpecField" class="field"><label class="field-label" for="pageSpec">处理页码</label><input id="pageSpec" type="text" placeholder="例如：1-3,5,8；旋转可填写 all" /><div id="pageSpecHint" class="hint"></div></div>
                            <div id="angleField" class="field is-hidden"><label class="field-label" for="rotateAngle">顺时针旋转</label><select id="rotateAngle"><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select></div>
                            <div class="field"><label class="field-label" for="pageOutputFilename">输出文件名</label><input id="pageOutputFilename" type="text" value="页面处理结果.pdf" /></div>
                        </div>

                        <div class="button-row"><button id="submitBtn" disabled><i class="fas fa-play"></i> 开始处理</button></div>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-head"><h2><i class="fas fa-circle-check"></i> 处理结果</h2><span id="taskIdText" class="hint"></span></div>
                    <div class="panel-body">
                        <div class="progress-shell"><div id="progressFill" class="progress-fill"></div></div>
                        <div class="status-line"><span id="statusText">等待提交</span><strong id="progressText">0%</strong></div>
                        <div class="metric-grid">
                            <div class="metric"><small>源页数</small><strong id="sourcePages">0</strong></div>
                            <div class="metric"><small>输出文件</small><strong id="outputFiles">0</strong></div>
                            <div class="metric"><small>原始大小</small><strong id="inputSize">0 B</strong></div>
                            <div class="metric"><small>输出大小</small><strong id="outputSize">0 B</strong></div>
                        </div>
                        <p id="summaryText" class="summary"></p>
                        <div id="downloadArea" class="download-area"></div>
                        <div id="resultTable" class="table-wrap is-hidden"><table><thead><tr><th>文件</th><th>页数</th><th>大小</th></tr></thead><tbody id="resultRows"></tbody></table></div>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="/static/pdf_tools.js"></script>
    <script src="/static/header.js"></script>
</body>
</html>
