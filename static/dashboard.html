<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #07111f;
            --card: rgba(255, 255, 255, 0.07);
            --line: rgba(255, 255, 255, 0.10);
            --text: #f6f8fb;
            --muted: rgba(246, 248, 251, 0.68);
            --cyan: #38bdf8;
            --green: #22c55e;
            --amber: #f59e0b;
            --rose: #fb7185;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.24), transparent 26%),
                radial-gradient(circle at 86% 14%, rgba(34, 197, 94, 0.15), transparent 22%),
                linear-gradient(145deg, #040812 0%, #091829 46%, #0d2138 100%);
        }

        .page {
            width: min(1320px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 48px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            font-weight: 700;
            font-size: 18px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.28), rgba(56, 189, 248, 0.62));
        }

        .topbar-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .topbar-nav a {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
        }

        .topbar-nav a.active {
            background: rgba(56, 189, 248, 0.18);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .stats-row {
            display: flex;
            gap: 14px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .stat-pill {
            flex: 1;
            min-width: 140px;
            padding: 18px 20px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--card);
            cursor: pointer;
        }

        .stat-pill.active {
            border-color: rgba(56, 189, 248, 0.5);
            background: rgba(56, 189, 248, 0.12);
        }

        .stat-pill .num {
            font-size: 28px;
            font-weight: 800;
            display: block;
        }

        .stat-pill .label {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .stat-pill.s-queued .num { color: var(--amber); }
        .stat-pill.s-running .num { color: var(--cyan); }
        .stat-pill.s-done .num { color: var(--green); }
        .stat-pill.s-failed .num { color: var(--rose); }
        .stat-pill.s-cancelled .num { color: #94a3b8; }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar select,
        .toolbar input {
            min-height: 40px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .toolbar select {
            min-width: 160px;
        }

        .toolbar input {
            flex: 1;
            min-width: 180px;
        }

        .btn-refresh {
            min-height: 40px;
            padding: 0 16px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .task-table-wrap {
            border: 1px solid var(--line);
            border-radius: 22px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
        }

        tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-queued { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .badge-running { background: rgba(56, 189, 248, 0.15); color: #7dd3fc; }
        .badge-done { background: rgba(34, 197, 94, 0.15); color: #86efac; }
        .badge-failed { background: rgba(251, 113, 133, 0.15); color: #fda4af; }
        .badge-cancelled { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }

        .mini-progress {
            width: 80px;
            height: 6px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .mini-progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--cyan), var(--green));
        }

        .cell-filename {
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cell-time {
            white-space: nowrap;
            color: var(--muted);
            font-size: 13px;
        }

        .btn-detail {
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
        }

        .pagination button {
            min-width: 36px;
            min-height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
        }

        .pagination button:disabled {
            opacity: .35;
        }

        .pagination button.active {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--cyan);
        }

        .pagination span {
            color: var(--muted);
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
            opacity: .4;
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 12, 24, 0.55);
            z-index: 900;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
        }

        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -520px;
            width: min(520px, 100vw);
            height: 100vh;
            z-index: 910;
            overflow-y: auto;
            padding: 28px;
            transition: right .3s ease;
            background: linear-gradient(180deg, #0c1e32 0%, #091627 100%);
            border-left: 1px solid var(--line);
            box-shadow: -12px 0 40px rgba(0, 0, 0, .4);
        }

        .drawer.open {
            right: 0;
        }

        .drawer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: grid;
            place-items: center;
        }

        .drawer h2 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .drawer .drawer-subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .detail-section {
            margin-bottom: 22px;
        }

        .detail-section h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .detail-item {
            padding: 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .detail-item .dl {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 3px;
        }

        .detail-item .dv {
            font-size: 14px;
            word-break: break-all;
        }

        .detail-progress-bar {
            width: 100%;
            height: 10px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            margin: 8px 0;
        }

        .detail-progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--cyan), var(--green));
        }

        .detail-log {
            margin: 0;
            padding: 14px;
            min-height: 100px;
            max-height: 240px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            border-radius: 14px;
            font: 12px/1.65 Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
            color: #e2e8f0;
            background: rgba(6, 17, 29, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .file-list {
            display: grid;
            gap: 8px;
        }

        .file-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .file-item .fi-name {
            font-size: 13px;
            word-break: break-all;
            white-space: normal;
            line-height: 1.45;
        }

        .file-item .fi-dl {
            align-self: flex-end;
            padding: 5px 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--green), #34d399);
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .detail-error {
            padding: 14px;
            border-radius: 14px;
            background: rgba(251, 113, 133, 0.1);
            border: 1px solid rgba(251, 113, 133, 0.2);
            color: #fda4af;
            font-size: 13px;
            word-break: break-all;
        }

        .btn-cancel {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid rgba(251, 113, 133, 0.4);
            background: rgba(251, 113, 133, 0.12);
            color: #fda4af;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-cancel-table {
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid rgba(251, 113, 133, 0.3);
            background: rgba(251, 113, 133, 0.1);
            color: #fda4af;
            cursor: pointer;
            font-size: 12px;
        }

        @media(max-width: 768px) {
            .stats-row {
                flex-direction: column;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .drawer {
                width: 100vw;
            }

            table {
                font-size: 13px;
            }

            thead th,
            tbody td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark"><i class="fas fa-gauge-high"></i></div>
                <div>任务工作台</div>
            </div>
            <nav class="topbar-nav">
                <a href="/dashboard" class="active"><i class="fas fa-gauge-high"></i> 工作台</a>
                <a href="/"><i class="fas fa-home"></i> 首页</a>
                <a href="/certificate-translation"><i class="fas fa-id-card"></i> 证件翻译</a>
                <a href="/number-check"><i class="fas fa-check-double"></i> 数字专检</a>
                <a href="/alignment"><i class="fas fa-object-group"></i> 对照记忆</a>
                <a href="/zhongfanyi"><i class="fas fa-spell-check"></i> 中翻译专检</a>
                <a href="/pdf2docx"><i class="fas fa-file-word"></i> 文档预处理V2</a>
            </nav>
        </header>

        <div class="stats-row" id="statsRow">
            <div class="stat-pill active" data-filter=""><span class="num" id="statTotal">-</span><span class="label">全部任务</span></div>
            <div class="stat-pill s-queued" data-filter="queued"><span class="num" id="statQueued">-</span><span class="label">排队中</span></div>
            <div class="stat-pill s-running" data-filter="running"><span class="num" id="statRunning">-</span><span class="label">处理中</span></div>
            <div class="stat-pill s-done" data-filter="done"><span class="num" id="statDone">-</span><span class="label">已完成</span></div>
            <div class="stat-pill s-failed" data-filter="failed"><span class="num" id="statFailed">-</span><span class="label">失败</span></div>
            <div class="stat-pill s-cancelled" data-filter="cancelled"><span class="num" id="statCancelled">-</span><span class="label">已取消</span></div>
        </div>

        <div class="toolbar">
            <select id="filterType">
                <option value="">全部类型</option>
                <option value="ocr">身份证 OCR</option>
                <option value="drivers_license">驾驶证翻译</option>
                <option value="doc_translate">通用证件翻译</option>
                <option value="business_licence">证件翻译（营业执照）</option>
                <option value="number_check">数字专检</option>
                <option value="zhongfanyi">中翻译专检</option>
                <option value="alignment">多语对照记忆</option>
                <option value="pdf2docx">文档预处理V2</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索文件名...">
            <button class="btn-refresh" id="btnRefresh"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>

        <div class="task-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>任务类型</th>
                        <th>文件名</th>
                        <th>状态</th>
                        <th>进度</th>
                        <th>提交时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="taskBody"></tbody>
            </table>
        </div>

        <div id="emptyState" class="empty-state" style="display:none">
            <i class="fas fa-inbox"></i>
            <p>暂无任务记录</p>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
        <button class="drawer-close" id="drawerClose"><i class="fas fa-times"></i></button>
        <div id="drawerContent"></div>
    </div>

    <script src="/static/dashboard.js"></script>
    <script src="/static/header.js"></script>
</body>
</html>
