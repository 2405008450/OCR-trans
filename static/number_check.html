<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字专检 - 文档数值校对</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-check-double"></i>
                <div>
                    <h1>数字专检</h1>
                    <p class="subtitle" id="pageSubtitle">使用新版数检程序核对译文中的数字、金额、编号、日期和比例。</p>
                </div>
            </div>
            <nav class="header-nav">
                <a href="/"><i class="fas fa-home"></i> 首页</a>
                <a href="/dashboard"><i class="fas fa-gauge-high"></i> 任务工作台</a>
            </nav>
        </header>

        <main class="main-content">
            <section class="upload-section" id="uploadSection">
                <div class="upload-card">
                    <div class="section-title-row">
                        <div>
                            <span class="section-kicker"><i class="fas fa-file-circle-check"></i> 新版数检</span>
                            <h2>上传待检查文件</h2>
                        </div>
                    </div>
                    <p class="upload-desc" id="uploadDesc">优先使用已对齐的 Excel；如没有对照表，可直接上传原文和译文文件。</p>

                    <div class="options-panel">
                        <div class="option-card" style="grid-column: 1 / -1;">
                            <div class="toggle-row" style="gap:18px; flex-wrap:wrap;">
                                <strong><i class="fas fa-sliders"></i> 检查模式</strong>
                                <label class="toggle-row">
                                    <input type="radio" name="checkMode" id="modeAlignment" value="alignment">
                                    <span>对照 Excel</span>
                                </label>
                                <label class="toggle-row">
                                    <input type="radio" name="checkMode" id="modeDirect" value="direct">
                                    <span>原文+译文</span>
                                </label>
                            </div>
                            <small id="modeHint">上传含“原文”“译文”两列的 Excel，可选上传译文文件生成修订版。</small>
                        </div>

                        <div class="option-group" style="grid-column: 1 / -1;">
                            <label for="modelSelect"><i class="fas fa-robot"></i> 模型选择</label>
                            <div class="field-wrap">
                                <select id="modelSelect"></select>
                            </div>
                            <small id="modelDesc"></small>
                        </div>

                        <div id="alignmentFields" style="grid-column: 1 / -1;">
                            <div class="option-group">
                                <label for="alignmentFile"><i class="fas fa-table"></i> 对照 Excel 文件</label>
                                <div class="field-wrap">
                                    <input type="file" id="alignmentFile" accept=".xlsx">
                                </div>
                            </div>
                            <div class="option-group">
                                <label for="targetFile"><i class="fas fa-file-pen"></i> 待修订译文文件（可选）</label>
                                <div class="field-wrap">
                                    <input type="file" id="targetFile" accept=".docx,.doc,.xlsx,.pptx,.pdf">
                                </div>
                            </div>
                            <div class="option-group">
                                <label for="sourceHfFile"><i class="fas fa-heading"></i> 页眉页脚原文 DOCX（可选）</label>
                                <div class="field-wrap">
                                    <input type="file" id="sourceHfFile" accept=".docx,.doc">
                                </div>
                            </div>
                        </div>

                        <div id="directFields" style="grid-column: 1 / -1; display:none;">
                            <div class="option-group">
                                <label for="sourceFile"><i class="fas fa-file-lines"></i> 原文文件</label>
                                <div class="field-wrap">
                                    <input type="file" id="sourceFile" accept=".docx,.doc,.xlsx,.pptx">
                                </div>
                            </div>
                            <div class="option-group">
                                <label for="directTargetFile"><i class="fas fa-file-pen"></i> 译文文件</label>
                                <div class="field-wrap">
                                    <input type="file" id="directTargetFile" accept=".docx,.doc,.xlsx,.pptx">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex; gap:12px; flex-wrap:wrap;">
                        <button class="btn-secondary" onclick="window.location.href='/'">
                            <i class="fas fa-home"></i> 返回首页
                        </button>
                        <button class="btn-primary" id="btnRunCheck" style="max-width:360px;">
                            <i class="fas fa-play"></i> 开始处理
                        </button>
                    </div>
                </div>
            </section>

            <section class="processing-section" id="processingSection" style="display:none;">
                <div class="processing-card">
                    <div class="spinner"></div>
                    <h2 id="processingTitle">数字专检处理中...</h2>
                    <p id="processingText">正在提交任务...</p>
                    <div class="progress-container" style="margin-top:24px;">
                        <div class="progress-bar" id="progressBar">
                            <span id="progressPercent" class="progress-text">0%</span>
                        </div>
                        <div class="progress-details" id="progressDetails"></div>
                    </div>
                </div>
            </section>

            <section class="result-section" id="resultSection" style="display:none;">
                <div class="result-header">
                    <h2><i class="fas fa-check-circle"></i> 专检完成</h2>
                    <button class="btn-secondary" id="btnReset">
                        <i class="fas fa-rotate-right"></i> 重新开始
                    </button>
                </div>
                <div id="resultSummary" style="margin-bottom:16px; color:var(--text-secondary, #64748b);"></div>
                <div class="result-stats" id="resultStats"></div>
                <div class="result-grid" id="resultGrid"></div>
            </section>
        </main>
    </div>
    <script src="/static/number_check.js"></script>
    <script src="/static/header.js"></script>
</body>
</html>
