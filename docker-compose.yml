services:
  fastapi-llm:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi-llm-demo:latest
    container_name: fastapi-llm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    env_file:
      - .env
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --proxy-headers
      - --forwarded-allow-ips=*
    expose:
      - "8001"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_DEFAULT_ROUTE=${GEMINI_DEFAULT_ROUTE:-google}
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-gen-lang-client-0128671098}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-global}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
      - LIBREOFFICE_PATH=${LIBREOFFICE_PATH:-/usr/bin/soffice}
      - HOST=0.0.0.0
      - PORT=8001
      - DEBUG=False
      - ALLOWED_ORIGINS=*
    volumes:
      # Google ADC 凭据（Vertex AI 认证）
      # Linux: GCLOUD_CONFIG_DIR=/root/.config/gcloud
      # Windows: GCLOUD_CONFIG_DIR=C:\Users\你的用户名\AppData\Roaming\gcloud
      - ${GCLOUD_CONFIG_DIR:-/root/.config/gcloud}:/root/.config/gcloud:ro
      # 持久化上传和输出文件（容器重启不丢失）
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./temp_images:/app/temp_images
      - ./businesslicence/uploads:/app/businesslicence/uploads
      - ./businesslicence/outputs:/app/businesslicence/outputs
      # PaddleOCR 模型缓存持久化（避免每次重启重新下载）
      - paddleocr_cache:/app/.paddleocr
    # 如果云服务器有 NVIDIA GPU，取消以下注释：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  nginx:
    image: nginx:1.27-alpine
    container_name: fastapi-llm-nginx
    restart: unless-stopped
    depends_on:
      fastapi-llm:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-8001}:80"
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

volumes:
  paddleocr_cache:
