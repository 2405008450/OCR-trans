document_orientation: auto
logging:
  level: INFO
performance:
  cache_ocr_results: true
  ocr_cache_size: 100
vertical_config:
  api:
    deepseek_key: sk-a681d5bc9d3f4278b084ad4606251298
    timeout: 10
    max_retries: 3
  ocr:
    engine: glm-api
    glm_api_key: c7970451446347e29f3f586514ef6894.8O7WrHEoZpZ7Y4HM
    use_server_model: false
    confidence_threshold: 0.6
    min_text_area: 100
    merge_threshold_horizontal: 10
    merge_threshold_vertical: 3
    font_size_diff_threshold: 0.2
    ignore_keywords:
    - CoJDe
    - COJDE
    - cojde
    smart_merge:
      enabled: true
      vertical_single_char_merge:
        enabled: true
    paragraph_merge:
      enabled: true
      x_tolerance: 10
      y_gap_max: 5
    noise_filter:
      enabled: true
      min_area: 50
      filter_single_char: true
  qr_pre_detection:
    enabled: true
    hard_protection: true
    mask_padding: 5
    mask_color: 255
    max_image_size: 2000
    downsample_ratio: 0.5
  rendering:
    font_family: Arial
    font_fallback:
    - DejaVu Sans
    - Liberation Sans
    font_scale: 0.9
    background_sample_radius: 10
    use_inpainting: true
    enable_antialiasing: true
    enable_stroke: false
    stroke_width: 1
    overlap_prevention:
      enabled: true
      step_size: 5.0
      max_iterations: 1000
    normalize_fields:
      enabled: true
      field_groups:
      - chinese_fields:
        - 名称
        - 类型
        - 住所
        - 法定代表人
        - 注册资本
        - 成立日期
        - 营业期限
        - 经营范围
        english_fields:
        - Name
        - Type
        - Address
        - Legal Representative
        - Registered Capital
        - Date of Establishment
        - Term of Operation
        - Business Scope
    seal_handling:
      enabled: true
    seal_text_handling:
      enabled: true
      min_distance: 10
      search_radius: 1000
      overlap_threshold: 0.05
      font_size: 12
      use_collision_detection: true  # 启用碰撞检测
      interactive_verification:  # 交互式验证配置
        enabled: true  # 启用交互式验证
        auto_confirm_threshold: 1.01  # 置信度高于此值自动确认（>1.0表示所有区域都需要手动确认）
        show_image_preview: false  # 是否显示图片预览
      frame_rendering:  # 框内渲染配置（新增）
        enabled: true
        frame_margin: 20
        min_frame_area: 10000
        frame_aspect_ratio_range: [0.8, 1.5]
      glm_layout_parsing:
        enabled: true
        timeout: 30
        fallback_to_existing: true
        max_image_size_mb: 10
    seal_detection:
      detect_red: true
      detect_blue: true
      detect_black: true  # 启用黑色印章检测
      red_saturation_min: 40
      red_value_min: 40
      blue_saturation_min: 40
      blue_value_min: 40
      black_saturation_max: 30  # 黑色印章的最大饱和度（降低以避免误检文字）
      black_value_min: 20  # 黑色印章的最小亮度（避免纯黑背景）
      black_value_max: 100  # 黑色印章的最大亮度（提高以包含深灰色印章）
      min_seal_area: 2000  # 最小印章面积（增加以过滤小噪点）
      max_seal_area: 100000  # 最大印章面积（避免检测整个图片）
      min_circularity: 0.4  # 最小圆度（提高以确保是圆形）
      expand_radius_ratio: 1.1
      overlap_threshold:
        small_text_height: 30
        small_text_ratio: 0.2
        normal_text_ratio: 0.3
        below_seal_ratio: 0.5
    precise_erase_mode: true
    align_field_contents:
      enabled: true
      y_threshold: 50
      x_distance_min: 0
      x_distance_max: 100
    boundary_limits:
      enabled: false
      right_margin: 310
      left_margin: 0
      top_margin: 0
      bottom_margin: 0
  icon_detection:
    aspect_ratio_threshold: 0.8
    complexity_threshold: 0.7
    text_density_threshold: 0.3
    whitelist:
    - qrcode
    - seal
    - logo
  quality:
    min_translation_coverage: 0.9
    check_artifacts: true
    generate_report: true
