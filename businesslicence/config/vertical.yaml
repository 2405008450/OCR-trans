# 竖版文档配置文件
# Vertical Document Configuration File
# =====================================
# 本配置文件专门用于处理竖版（纵向）文档
# This configuration file is specifically designed for vertical (portrait) documents

# 文档方向：vertical（竖版）或 horizontal（横版）
# Document orientation: vertical or horizontal
document_orientation: "vertical"

# ============================================================================
# 全局配置（两种方向共享）
# Global Configuration (shared by both orientations)
# ============================================================================

logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"

performance:
  # 是否缓存 OCR 结果以提高性能
  # Whether to cache OCR results for better performance
  cache_ocr_results: true
  
  # OCR 结果缓存大小（最多缓存多少个结果）
  # OCR result cache size (maximum number of cached results)
  ocr_cache_size: 100

# ============================================================================
# 竖版配置区块
# Vertical Configuration Block
# ============================================================================
# 本区块包含所有竖版文档的专用优化参数
# This block contains all optimization parameters specific to vertical documents

vertical_config:
  # --------------------------------------------------------------------------
  # API 配置
  # API Configuration
  # --------------------------------------------------------------------------
  api:
    # DeepSeek API 密钥（支持环境变量）
    # DeepSeek API key (supports environment variable)
    deepseek_key: ${DEEPSEEK_API_KEY}
    
    # API 请求超时时间（秒）
    # API request timeout (seconds)
    timeout: 10
    
    # 最大重试次数
    # Maximum number of retries
    max_retries: 3
    
    # 重试退避时间（秒）
    # Retry backoff times (seconds)
    retry_backoff: [1, 2, 4]
  
  # --------------------------------------------------------------------------
  # OCR 配置
  # OCR Configuration
  # --------------------------------------------------------------------------
  ocr:
    # OCR 引擎类型
    # OCR engine type
    engine: paddleocr
    
    # 是否使用服务器模型（false 使用本地模型）
    # Whether to use server model (false uses local model)
    use_server_model: false
    
    # 置信度阈值：低于此值的识别结果将被过滤
    # Confidence threshold: recognition results below this value will be filtered
    confidence_threshold: 0.6
    
    # 最小文本区域：小于此面积的文本框将被过滤（像素平方）
    # Minimum text area: text boxes smaller than this area will be filtered (square pixels)
    min_text_area: 100
    
    # 水平合并阈值：两个文本框水平距离小于此值时可能合并（像素）
    # Horizontal merge threshold: text boxes may merge if horizontal distance is less than this (pixels)
    merge_threshold_horizontal: 10
    
    # 垂直合并阈值：两个文本框垂直距离小于此值时可能合并（像素）
    # Vertical merge threshold: text boxes may merge if vertical distance is less than this (pixels)
    merge_threshold_vertical: 3
    
    # 字体大小差异阈值：字体大小差异超过此比例时不合并
    # Font size difference threshold: do not merge if font size difference exceeds this ratio
    font_size_diff_threshold: 0.2
    
    # ========================================================================
    # 竖版专用：检测参数
    # Vertical-specific: Detection Parameters
    # ========================================================================
    # 这些参数针对竖版文档的特点进行了优化
    # These parameters are optimized for the characteristics of vertical documents
    
    # 文本检测阈值：控制文本区域的检测灵敏度（0-1，越小越灵敏）
    # Text detection threshold: controls sensitivity of text region detection (0-1, smaller is more sensitive)
    det_db_thresh: 0.3
    
    # 边界框阈值：控制文本框边界的精确度（0-1，越大越精确）
    # Bounding box threshold: controls precision of text box boundaries (0-1, larger is more precise)
    det_db_box_thresh: 0.5
    
    # 边界框扩展比例：控制文本框的扩展程度（越大文本框越大）
    # Bounding box unclip ratio: controls expansion of text boxes (larger means bigger boxes)
    det_db_unclip_ratio: 1.5
    
    # ========================================================================
    # 智能合并配置
    # Smart Merge Configuration
    # ========================================================================
    smart_merge:
      # 是否启用智能合并功能
      # Whether to enable smart merge feature
      enabled: false
      
      # 垂直单字合并配置
      # Vertical single character merge configuration
      vertical_single_char_merge:
        # 竖版禁用垂直单字合并（因为竖版文档本身就是垂直排列）
        # Disabled for vertical documents (as vertical documents are already vertically arranged)
        enabled: false
    
    # ========================================================================
    # 段落合并配置
    # Paragraph Merge Configuration
    # ========================================================================
    paragraph_merge:
      # 竖版禁用段落合并（避免误合并独立的字段）
      # Disabled for vertical documents (to avoid incorrectly merging independent fields)
      enabled: false
    
    # ========================================================================
    # 字段感知合并配置
    # Field-Aware Merge Configuration
    # ========================================================================
    # 针对营业执照等文档的字段感知段落合并功能
    # Field-aware paragraph merging for business license and similar documents
    field_aware_merge:
      # 是否启用字段感知合并
      # Whether to enable field-aware merging
      enabled: true
      
      # 水平对齐容差（像素）
      # Horizontal alignment tolerance (pixels)
      x_tolerance: 10
      
      # 垂直间距阈值（像素）
      # Vertical gap threshold (pixels)
      y_gap_max: 5
      
      # 字体大小差异阈值（比例，0-1）
      # Font size difference threshold (ratio, 0-1)
      font_size_diff_threshold: 0.2
      
      # 已知字段标签列表
      # List of known field labels
      known_field_labels:
        - "经营范围"
        - "住所"
        - "法定代表人"
        - "注册资本"
        - "成立日期"
        - "营业期限"
      
      # 长文本字段列表（需要特殊处理的字段）
      # List of long text fields (fields requiring special handling)
      long_text_fields:
        - "经营范围"
        - "住所"
      
      # 长文本字段的垂直间距阈值（像素）
      # Vertical gap threshold for long text fields (pixels)
      long_text_field_y_gap_max: 10
      
      # 是否记录合并决策日志
      # Whether to log merge decisions
      log_merge_decisions: true
      
      # 日志级别
      # Log level
      log_level: "INFO"
    
    # ========================================================================
    # 噪点过滤配置（竖版专用）
    # Noise Filter Configuration (Vertical-specific)
    # ========================================================================
    # 竖版文档常有印章、水印等噪点，需要特殊过滤
    # Vertical documents often have noise like seals and watermarks that need special filtering
    noise_filter:
      # 是否启用噪点过滤
      # Whether to enable noise filtering
      enabled: true
      
      # 最小区域：小于此面积的文本框被视为噪点（像素平方）
      # Minimum area: text boxes smaller than this area are considered noise (square pixels)
      min_area: 50
      
      # 是否过滤单字符噪点
      # Whether to filter single character noise
      filter_single_char: true
  
  # --------------------------------------------------------------------------
  # 渲染配置
  # Rendering Configuration
  # --------------------------------------------------------------------------
  rendering:
    # 字体家族
    # Font family
    font_family: Arial
    
    # 备用字体列表（当主字体不可用时使用）
    # Fallback font list (used when primary font is unavailable)
    font_fallback:
      - DejaVu Sans
      - Liberation Sans
    
    # 字体缩放比例：控制渲染文本的大小（0-1，越小字体越小）
    # Font scale: controls size of rendered text (0-1, smaller means smaller font)
    font_scale: 0.9
    
    # 背景采样半径：采样背景颜色时的半径（像素）
    # Background sample radius: radius for sampling background color (pixels)
    background_sample_radius: 10
    
    # 是否使用修复算法（inpainting）来填充擦除区域
    # Whether to use inpainting algorithm to fill erased areas
    use_inpainting: true
    
    # 是否启用抗锯齿
    # Whether to enable antialiasing
    enable_antialiasing: true
    
    # 是否启用描边效果
    # Whether to enable stroke effect
    enable_stroke: false
    
    # 描边宽度（像素）
    # Stroke width (pixels)
    stroke_width: 1
    
    # ========================================================================
    # 重叠防止配置（竖版启用）
    # Overlap Prevention Configuration (Enabled for vertical)
    # ========================================================================
    # 竖版文档字段密集，容易出现文本重叠，需要启用重叠防止
    # Vertical documents have dense fields and are prone to text overlap, so overlap prevention is needed
    overlap_prevention:
      # 是否启用重叠防止功能
      # Whether to enable overlap prevention feature
      enabled: true
      
      # 调整步长：每次调整文本位置的步长（像素）
      # Adjustment step size: step size for each text position adjustment (pixels)
      step_size: 5.0
      
      # 最大迭代次数：防止无限循环
      # Maximum iterations: prevent infinite loops
      max_iterations: 1000
    
    # ========================================================================
    # 字段标准化配置（竖版启用）
    # Field Normalization Configuration (Enabled for vertical)
    # ========================================================================
    # 确保中英文字段对齐和格式统一
    # Ensure alignment and format consistency of Chinese and English fields
    normalize_fields:
      # 是否启用字段标准化功能
      # Whether to enable field normalization feature
      enabled: true
      
      # 字段组定义：定义哪些中文字段对应哪些英文字段
      # Field group definitions: define which Chinese fields correspond to which English fields
      field_groups:
        - chinese_fields: ["名称", "类型", "住所"]
          english_fields: ["Name", "Type", "Address"]
    
    # ========================================================================
    # 印章处理配置
    # Seal Handling Configuration
    # ========================================================================
    seal_handling:
      # 是否启用印章处理功能
      # Whether to enable seal handling feature
      enabled: true
    
    # ========================================================================
    # 精确擦除模式（竖版专用）
    # Precise Erase Mode (Vertical-specific)
    # ========================================================================
    # 竖版文档需要更精确的文本擦除，避免影响周围内容
    # Vertical documents require more precise text erasure to avoid affecting surrounding content
    precise_erase_mode: true
  
  # --------------------------------------------------------------------------
  # 图标检测配置
  # Icon Detection Configuration
  # --------------------------------------------------------------------------
  icon_detection:
    # 宽高比阈值：宽高比接近 1 的区域可能是图标
    # Aspect ratio threshold: regions with aspect ratio close to 1 may be icons
    aspect_ratio_threshold: 0.8
    
    # 复杂度阈值：复杂度高的区域可能是图标
    # Complexity threshold: regions with high complexity may be icons
    complexity_threshold: 0.7
    
    # 文本密度阈值：文本密度低的区域可能是图标
    # Text density threshold: regions with low text density may be icons
    text_density_threshold: 0.3
    
    # 白名单：明确标识为图标的类型
    # Whitelist: types explicitly identified as icons
    whitelist:
      - qrcode
      - seal
      - logo
  
  # --------------------------------------------------------------------------
  # 质量控制配置
  # Quality Control Configuration
  # --------------------------------------------------------------------------
  quality:
    # 最小翻译覆盖率：翻译文本应覆盖原文本的最小比例
    # Minimum translation coverage: minimum ratio of translation text covering original text
    min_translation_coverage: 0.9
    
    # 是否检查渲染瑕疵
    # Whether to check for rendering artifacts
    check_artifacts: true
    
    # 是否生成质量报告
    # Whether to generate quality report
    generate_report: true

# ============================================================================
# 横版配置区块（占位）
# Horizontal Configuration Block (Placeholder)
# ============================================================================
# 在竖版配置文件中，横版配置区块仅作为占位符存在
# 当 document_orientation 为 "vertical" 时，此区块不会被使用
# In vertical configuration file, horizontal config block exists only as a placeholder
# When document_orientation is "vertical", this block will not be used

horizontal_config:
  api:
    deepseek_key: ${DEEPSEEK_API_KEY}
    timeout: 10
    max_retries: 3
  
  ocr:
    engine: paddleocr
    confidence_threshold: 0.6
    min_text_area: 100
  
  rendering:
    font_family: Arial
    font_scale: 0.9
    background_sample_radius: 10
